# JanSahay AI - Docker Compose
# Full-stack deployment: Backend, Frontend, PostgreSQL, Redis, Prometheus, Grafana, Nginx

version: '3.9'

services:
  # ============================================
  # Reverse Proxy / Load Balancer
  # ============================================
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - jansahay-net

  # ============================================
  # Backend (FastAPI)
  # ============================================
  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://jansahay:jansahay_secret@postgres:5432/jansahay_db
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: [ "CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/health'); assert r.status_code == 200" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - jansahay-net

  # ============================================
  # Frontend (React / Nginx)
  # ============================================
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - jansahay-net

  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jansahay_db
      POSTGRES_USER: jansahay
      POSTGRES_PASSWORD: jansahay_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U jansahay -d jansahay_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - jansahay-net

  # ============================================
  # Redis Cache
  # ============================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - jansahay-net

  # ============================================
  # Prometheus (Metrics)
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - jansahay-net

  # ============================================
  # Grafana (Dashboards)
  # ============================================
  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - jansahay-net

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:


networks:
  jansahay-net:
    driver: bridge
